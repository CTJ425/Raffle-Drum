name: raffle-drum

services:
  backend:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.backend
    image: raffle-backend:0.1.1
    container_name: raffle-backend
    # 不對主機映射 port:後端只供 frontend 容器經內部網路存取
    expose:
      - "5000"
    environment:
      - PORT=5000
      - DATA_DIR=/app/data
    volumes:
      - ../../backend-data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.frontend
    image: raffle-frontend:0.1.1
    container_name: raffle-frontend
    ports:
      - "3000:80"
    environment:
      - BACKEND_HOST=backend
    depends_on:
      - backend
    restart: unless-stopped
